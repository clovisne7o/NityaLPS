<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitya Tech | Landing Pages de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050810; 
        }

        /* Animação suave para a logo não ficar estática */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }
        .float-logo { animation: float 5s ease-in-out infinite; }

        .text-gradient {
            background: linear-gradient(to right, #ffffff, #ffc42b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(255, 196, 43, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-gray-100 overflow-x-hidden selection:bg-[#ffc42b] selection:text-black">

    <!-- Header -->
    <header class="fixed w-full z-50 bg-[#050810]/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <!-- Se o arquivo logo.svg estiver na mesma pasta, ele VAI aparecer aqui -->
                <img src="logo.svg" alt="Nitya Tech" class="h-10 w-auto">
            </div>
            <a href="https://wa.me/5587991422587" class="bg-[#ffc42b] text-black px-6 py-2 rounded-full font-bold text-sm transition-all btn-glow">
                ORÇAMENTO
            </a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="min-h-screen flex items-center pt-20 px-6 relative">
        <!-- Luz de fundo -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#ffc42b]/5 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center relative z-10">
            
            <div class="space-y-8">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-[#ffc42b]/30 bg-[#ffc42b]/5 text-[#ffc42b] text-xs font-bold uppercase tracking-widest">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#ffc42b] opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-[#ffc42b]"></span>
                    </span>
                    Landing Pages de Alta Conversão
                </div>
                
                <h1 class="text-6xl md:text-8xl font-black leading-[0.9] tracking-tighter text-white">
                    Sua página <br><span class="text-gradient">de elite.</span>
                </h1>
                
                <p class="text-gray-400 text-xl max-w-lg leading-relaxed border-l-2 border-[#ffc42b] pl-6">
                    A Nitya cria ativos digitais que não só impressionam, mas que **convertem cliques em dinheiro**.
                </p>
                
                <div class="pt-4">
                    <a href="https://wa.me/5587991422587" class="bg-[#ffc42b] text-black px-12 py-6 rounded-2xl font-black text-xl transition-all btn-glow inline-block">
                        QUERO VENDER MAIS
                    </a>
                </div>
            </div>

            <!-- CONTAINER DA LOGO REAL -->
            <div class="flex justify-center items-center">
                <div class="float-logo p-8 md:p-12 rounded-[50px] bg-white/[0.01] border border-white/5 backdrop-blur-3xl shadow-2xl">
                    <!-- Aqui chamamos o seu arquivo .svg diretamente -->
                    <img src="logo.svg" alt="Nitya Technology" class="w-full max-w-xl">
                </div>
            </div>
        </div>
    </section>

    <!-- Seção Técnica Rápida -->
    <section class="py-20 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
            <div>
                <p class="text-3xl font-black text-white leading-none">100%</p>
                <p class="text-gray-500 text-xs uppercase mt-2 tracking-widest">Responsivo</p>
            </div>
            <div>
                <p class="text-3xl font-black text-white leading-none">< 1s</p>
                <p class="text-gray-500 text-xs uppercase mt-2 tracking-widest">Carregamento</p>
            </div>
            <div>
                <p class="text-3xl font-black text-white leading-none">SEO</p>
                <p class="text-gray-500 text-xs uppercase mt-2 tracking-widest">Otimizado</p>
            </div>
            <div>
                <p class="text-3xl font-black text-white leading-none">UX</p>
                <p class="text-gray-500 text-xs uppercase mt-2 tracking-widest">Premium</p>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center opacity-30">
        <p class="text-[10px] font-bold uppercase tracking-[0.5em]">Nitya Tech &copy; 2024</p>
    </footer>

</body>
</html>
