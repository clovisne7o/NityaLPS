    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020408; }

        /* Animação da Logo flutuando */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .float-animation { animation: float 6s ease-in-out infinite; }

        /* Engrenagem girando */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #engrenagem-logo { 
            animation: spin 20s linear infinite; 
            transform-origin: center;
            transform-box: fill-box;
        }

        /* Texto em gradiente */
        .text-gradient {
            background: linear-gradient(to right, #ffffff, #ffc42b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cartão de vidro sutil */
        .glass-container {
            background: radial-gradient(circle at center, rgba(255, 196, 43, 0.05) 0%, transparent 70%);
        }
    </style>
